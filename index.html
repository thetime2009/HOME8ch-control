<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home_8ch - v1.3 (Real-time Sync)</title>
    <style>
        :root { 
            --bright-green: #26ff00; 
            --dark-bg: #0a0a0a; 
            --card-bg: #1a1a1a; 
            --offline-red: #ff3131;
        }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: #fff; padding: 20px; text-align: center; }
        
        /* Server Status UI */
        .server-status {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 20px; background: #222; margin-bottom: 20px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .online { background: var(--bright-green); box-shadow: 0 0 10px var(--bright-green); }
        .offline { background: var(--offline-red); box-shadow: 0 0 10px var(--offline-red); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 800px; margin: auto; }
        .card { background: var(--card-bg); border-radius: 18px; padding: 20px; border: 1px solid #333; transition: 0.3s; }
        .card.active { border-color: var(--bright-green); box-shadow: 0 0 15px rgba(38, 255, 0, 0.2); }
        
        .btn-toggle { width: 60px; height: 30px; background: #333; border-radius: 20px; position: relative; cursor: pointer; margin: 15px auto 0; }
        .btn-toggle::before { content: ''; position: absolute; width: 22px; height: 22px; background: #fff; border-radius: 50%; top: 4px; left: 4px; transition: 0.3s; }
        .active .btn-toggle { background: var(--bright-green); }
        .active .btn-toggle::before { left: 34px; }

        .master-controls { display: flex; gap: 10px; max-width: 800px; margin: 30px auto; }
        .m-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-on { background: var(--bright-green); color: #000; }
        .btn-off { background: #444; color: #fff; }
        .version { font-size: 0.7rem; color: #444; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>HOME_8CH</h1>
    
    <div class="server-status">
        <div id="status-dot" class="dot offline"></div>
        <span id="status-text" style="font-size: 0.8rem;">กำลังซิงค์...</span>
    </div>

    <div class="grid" id="main-grid"></div>

    <div class="master-controls">
        <button class="m-btn btn-on" onclick="masterAction(1)">ALL ON</button>
        <button class="m-btn btn-off" onclick="masterAction(0)">ALL OFF</button>
    </div>

    <div class="version">v1.3 Stable Sync | แก้ไขระบบอัปเดตดีเลย์</div>

<script>
    const TOKEN = "qfA4LcrrzCc6bpHib_y9ZPLGla5OYdi1";
    const API_BASE = "https://sgp1.blynk.cloud/external/api/";

    let relayStates = new Array(8).fill(false);

    // สร้าง UI
    const grid = document.getElementById('main-grid');
    for(let i=0; i<8; i++) {
        grid.innerHTML += `
            <div class="card" id="card-${i}">
                <span>Relay ${i+1}</span>
                <div class="btn-toggle" onclick="toggle(${i})"></div>
            </div>
        `;
    }

    // ฟังก์ชันตรวจสอบสถานะบอร์ด
    async function checkServer() {
        try {
            const res = await fetch(`${API_BASE}isHardwareConnected?token=${TOKEN}`);
            const isOnline = await res.json();
            document.getElementById('status-dot').className = isOnline ? "dot online" : "dot offline";
            document.getElementById('status-text').innerText = isOnline ? "BOARD ONLINE" : "BOARD OFFLINE";
        } catch (e) { console.error("Server Check Error"); }
    }

    // ฟังก์ชันดึงสถานะจาก Blynk
    async function syncStatus() {
        try {
            for(let i=0; i<8; i++) {
                const res = await fetch(`${API_BASE}get?token=${TOKEN}&V${i}`);
                if (res.ok) {
                    const val = await res.text();
                    relayStates[i] = (val.trim() === "1");
                }
            }
            updateUI();
        } catch (err) { console.error("Sync Error"); }
    }

    // ฟังก์ชันควบคุมรายตัว
    async function toggle(id) {
        // 1. เปลี่ยนสถานะบนหน้าเว็บทันที (Optimistic UI)
        relayStates[id] = !relayStates[id];
        updateUI();

        // 2. ส่งคำสั่งไป Blynk
        const val = relayStates[id] ? 1 : 0;
        await fetch(`${API_BASE}update?token=${TOKEN}&V${id}=${val}`);

        // 3. หน่วงเวลา 800ms แล้วซิงค์ค่าจริงกลับมาอีกครั้งเพื่อความแม่นยำ
        setTimeout(syncStatus, 800);
    }

    async function masterAction(val) {
        const vPin = val === 1 ? 'V8' : 'V9';
        relayStates.fill(val === 1);
        updateUI();
        
        await fetch(`${API_BASE}update?token=${TOKEN}&${vPin}=1`);
        
        // Master action ใช้เวลาประมวลผลนานกว่า จึงหน่วง 1.5 วินาที
        setTimeout(syncStatus, 1500);
    }

    function updateUI() {
        relayStates.forEach((state, i) => {
            const card = document.getElementById(`card-${i}`);
            state ? card.classList.add('active') : card.classList.remove('active');
        });
    }

    // เริ่มทำงานเมื่อโหลดหน้าเว็บ
    window.onload = () => {
        syncStatus();
        checkServer();
        setInterval(checkServer, 10000); // เช็คสถานะบอร์ดทุก 10 วินาที
    };
</script>
</body>
</html>
