<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home_8ch - Smart Sync Control</title>
    <style>
        :root {
            --bright-green: #26ff00; /* สีเขียวสว่างตามโจทย์ */
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-gray: #888;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--bright-green);
            text-shadow: 0 0 20px rgba(38, 255, 0, 0.5);
            margin: 0;
            letter-spacing: 2px;
        }

        .status-badge {
            font-size: 0.8rem;
            color: var(--text-gray);
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid #333;
            text-align: center;
            transition: all 0.3s ease;
        }

        /* เมื่อ Relay เปิดอยู่ */
        .card.active {
            border-color: var(--bright-green);
            box-shadow: 0 0 15px rgba(38, 255, 0, 0.2);
        }

        .relay-name {
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }

        .btn-toggle {
            width: 70px;
            height: 35px;
            background: #333;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            margin: auto;
            transition: 0.4s;
        }

        .btn-toggle::before {
            content: '';
            position: absolute;
            width: 27px;
            height: 27px;
            background: #fff;
            border-radius: 50%;
            top: 4px;
            left: 4px;
            transition: 0.4s;
        }

        .active .btn-toggle { background: var(--bright-green); }
        .active .btn-toggle::before { left: 39px; }

        .master-controls {
            display: flex;
            gap: 10px;
            max-width: 900px;
            margin: 30px auto;
        }

        .m-btn {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn-on { background: var(--bright-green); color: #000; }
        .btn-off { background: #444; color: #fff; }
        .m-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

<div class="header">
    <h1>HOME_8CH</h1>
    <div class="status-badge" id="sync-status">กำลังซิงค์สถานะ...</div>
</div>

<div class="grid" id="main-grid">
    <!-- ปุ่มจะถูกสร้างที่นี่ -->
</div>

<div class="master-controls">
    <button class="m-btn btn-on" onclick="masterAction(1)">เปิดทั้งหมด (ALL ON)</button>
    <button class="m-btn btn-off" onclick="masterAction(0)">ปิดทั้งหมด (ALL OFF)</button>
</div>

<script>
    const TOKEN = "qfA4LcrrzCc6bpHib_y9ZPLGla5OYdi1";
    const API_BASE = "https://sgp1.blynk.cloud/external/api/";

    // เก็บสถานะจริง 8 ช่อง
    let relayStates = new Array(8).fill(false);

    // 1. สร้าง UI
    const grid = document.getElementById('main-grid');
    for(let i=0; i<8; i++) {
        grid.innerHTML += `
            <div class="card" id="card-${i}">
                <span class="relay-name">Relay ${i+1}</span>
                <div class="btn-toggle" onclick="toggle(${i})"></div>
            </div>
        `;
    }

    // 2. ฟังก์ชันดึงสถานะจาก Cloud (Sync)
    async function syncStatus() {
        document.getElementById('sync-status').innerText = "กำลังดึงข้อมูลจาก Cloud...";
        try {
            for(let i=0; i<8; i++) {
                const res = await fetch(`${API_BASE}get?token=${TOKEN}&V${i}`);
                const val = await res.text();
                relayStates[i] = (val == "1");
            }
            updateUI();
            document.getElementById('sync-status').innerText = "สถานะปัจจุบันอัปเดตแล้ว";
        } catch (err) {
            document.getElementById('sync-status').innerText = "ซิงค์ไม่สำเร็จ กรุณารีเฟรชหน้าเว็บ";
        }
    }

    // 3. ฟังก์ชันควบคุมรายตัว
    async function toggle(id) {
        relayStates[id] = !relayStates[id];
        const val = relayStates[id] ? 1 : 0;
        updateUI();
        await fetch(`${API_BASE}update?token=${TOKEN}&V${id}=${val}`);
    }

    // 4. ฟังก์ชัน Master
    async function masterAction(val) {
        const vPin = (val === 1) ? 'V8' : 'V9';
        relayStates.fill(val === 1);
        updateUI();
        await fetch(`${API_BASE}update?token=${TOKEN}&${vPin}=1`);
    }

    // 5. อัปเดตการแสดงผลบนเว็บ
    function updateUI() {
        relayStates.forEach((state, i) => {
            const card = document.getElementById(`card-${i}`);
            state ? card.classList.add('active') : card.classList.remove('active');
        });
    }

    // เริ่มต้นดึงข้อมูลเมื่อโหลดหน้าเว็บ
    window.onload = syncStatus;

</script>
</body>
</html>
