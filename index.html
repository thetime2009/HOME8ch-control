<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Smart Control 8CH</title>
    <style>
        :root {
            --bg: #050505;
            --card: rgba(23, 23, 23, 0.8);
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; text-align: center; }
        
        /* Server Status Badge */
        .status-badge {
            display: inline-flex; align-items: center; padding: 5px 15px; border-radius: 20px;
            font-size: 0.8rem; margin-bottom: 20px; background: rgba(255,255,255,0.05);
        }
        .dot { height: 8px; width: 8px; border-radius: 50%; margin-right: 8px; }
        .online { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
        .offline { background: var(--neon-red); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; max-width: 800px; margin: auto; }
        
        .relay-card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 15px; transition: 0.4s; position: relative;
        }
        .relay-card.active { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0,210,255,0.2); }

        .btn-main {
            width: 100%; height: 60px; border-radius: 15px; border: none; font-weight: bold;
            cursor: pointer; margin-top: 10px; transition: 0.3s; color: white;
            background: #222; font-size: 1rem;
        }
        .active .btn-main { background: var(--neon-blue); color: black; }
        
        .timer-display { font-size: 0.75rem; color: var(--neon-blue); margin-top: 5px; height: 15px; font-family: monospace; }
        
        /* Schedule Input */
        .schedule-box { margin-top: 10px; font-size: 0.7rem; color: #777; }
        .schedule-input { width: 50px; background: transparent; border: 1px solid #444; color: white; border-radius: 5px; text-align: center; }

    </style>
</head>
<body>

    <div class="status-badge">
        <div id="status-dot" class="dot offline"></div>
        <span id="status-text">SERVER OFFLINE</span>
    </div>

    <div class="grid" id="main-grid"></div>

<script>
    const TOKEN = "qfA4LcrrzCc6bpHib_y9ZPLGla5OYdi1";
    const API_BASE = `https://sgp1.blynk.cloud/external/api/`;
    
    let devices = Array(8).fill(null).map(() => ({ active: false, startTime: null, timer: null }));

    // สร้าง UI
    const grid = document.getElementById('main-grid');
    for(let i=0; i<8; i++) {
        grid.innerHTML += `
            <div class="relay-card" id="card-${i}">
                <div style="font-size:0.9rem">Relay ${i+1}</div>
                <div id="time-${i}" class="timer-display"></div>
                <button class="btn-main" onclick="toggleRelay(${i})">ON / OFF</button>
                <div class="schedule-box">
                    ปิดอัตโนมัติใน <input type="number" id="sched-${i}" class="schedule-input" placeholder="0"> นาที
                </div>
            </div>
        `;
    }

    async function toggleRelay(id) {
        devices[id].active = !devices[id].active;
        const val = devices[id].active ? 1 : 0;
        
        if(devices[id].active) {
            devices[id].startTime = Date.now();
            checkSchedule(id);
        } else {
            devices[id].startTime = null;
        }

        updateUI();
        await fetch(`${API_BASE}update?token=${TOKEN}&V${id}=${val}`);
    }

    function checkSchedule(id) {
        const mins = document.getElementById(`sched-${id}`).value;
        if(mins > 0) {
            setTimeout(() => {
                if(devices[id].active) toggleRelay(id);
            }, mins * 60000);
        }
    }

    function updateUI() {
        devices.forEach((dev, i) => {
            const card = document.getElementById(`card-${i}`);
            dev.active ? card.classList.add('active') : card.classList.remove('active');
        });
    }

    // ฟังก์ชันเช็ค Server Status
    async function checkServer() {
        try {
            const res = await fetch(`${API_BASE}isHardwareConnected?token=${TOKEN}`);
            const isOnline = await res.json();
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            if(isOnline) {
                dot.className = "dot online";
                txt.innerText = "SERVER ONLINE";
            } else {
                dot.className = "dot offline";
                txt.innerText = "SERVER OFFLINE";
            }
        } catch(e) {}
    }

    // Loop อัปเดตเวลาในปุ่ม
    setInterval(() => {
        devices.forEach((dev, i) => {
            if(dev.active && dev.startTime) {
                const diff = Math.floor((Date.now() - dev.startTime) / 1000);
                const m = Math.floor(diff / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                document.getElementById(`time-${i}`).innerText = `RUNNING: ${m}:${s}`;
            } else {
                document.getElementById(`time-${i}`).innerText = "";
            }
        });
        checkServer();
    }, 1000);

</script>
</body>
</html>
