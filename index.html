<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <!-- ล็อคขนาดหน้าจอไม่ให้ซูม และให้พอดีมือถือ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ตั้งค่าให้ดูเหมือนแอป (Mobile App Capable) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>HOME 8CH</title>
    <style>
        :root { 
            --bright-green: #26ff00; 
            --dark-bg: #000000; /* ดำสนิทเพื่อความเนียนบนจอ OLED */
            --card-bg: #111111; 
            --bulb-off: #333333; 
            --bulb-on: #ffd700; 
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; /* ลบไฮไลท์สีฟ้าเวลาแตะบนมือถือ */
            user-select: none; /* ห้ามลากคลุมข้อความ */
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--dark-bg); 
            color: #fff; 
            margin: 0;
            padding: 20px 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 1.5rem; margin-top: 10px; letter-spacing: 2px; }

        .header-controls { margin-bottom: 25px; }

        .server-status { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            padding: 6px 15px; 
            border-radius: 20px; 
            background: #1a1a1a;
            font-size: 0.75rem;
            border: 1px solid #222;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .online { background: var(--bright-green); box-shadow: 0 0 8px var(--bright-green); }
        .offline { background: #ff3131; box-shadow: 0 0 8px #ff3131; }

        /* จัด Grid ให้เป็น 2 คอลัมน์บนมือถือ */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            width: 100%;
            max-width: 500px; 
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 20px; 
            padding: 20px 10px; 
            border: 1px solid #222; 
            transition: transform 0.1s active; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px;
        }

        .card:active { transform: scale(0.95); /* เอฟเฟกต์ยุบตัวเวลาแตะ */ }
        .card.active { border-color: var(--bright-green); background: #0a1105; }

        .bulb-icon { 
            width: 45px; height: 45px; 
            fill: var(--bulb-off); 
            transition: 0.3s; 
        }
        .active .bulb-icon { 
            fill: var(--bulb-on); 
            filter: drop-shadow(0 0 10px var(--bulb-on)); 
        }

        span { font-size: 0.9rem; font-weight: 500; color: #ccc; }
        .active span { color: #fff; }

        .btn-toggle { 
            width: 44px; height: 22px; 
            background: #333; border-radius: 15px; 
            position: relative; 
        }
        .btn-toggle::before { 
            content: ''; position: absolute; 
            width: 16px; height: 16px; 
            background: #fff; border-radius: 50%; 
            top: 3px; left: 3px; transition: 0.2s; 
        }
        .active .btn-toggle { background: var(--bright-green); }
        .active .btn-toggle::before { left: 25px; }

        /* ปุ่ม Master ปรับให้ใหญ่ขึ้นกดง่าย */
        .master-controls { 
            display: flex; gap: 10px; 
            width: 100%; max-width: 500px; 
            margin: 30px 0; 
        }
        .m-btn { 
            flex: 1; padding: 18px; 
            border-radius: 15px; border: none; 
            font-weight: bold; font-size: 0.9rem;
            text-transform: uppercase;
        }
        .btn-on { background: var(--bright-green); color: #000; }
        .btn-off { background: #222; color: #fff; border: 1px solid #333; }
        
        .version { font-size: 0.65rem; color: #333; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>HOME_PTTS_8CH</h1>
    
    <div class="header-controls">
        <div class="server-status">
            <div id="status-dot" class="dot offline"></div>
            <span id="status-text">CONNECTING...</span>
        </div>
    </div>

    <div class="grid" id="main-grid"></div>

    <div class="master-controls">
        <button class="m-btn btn-on" onclick="masterAction(1)">ON ALL</button>
        <button class="m-btn btn-off" onclick="masterAction(0)">OFF ALL</button>
    </div>

    <div class="version">v3.0 | Mobile App UI | 2s Auto Sync</div>

<script>
    const TOKEN = "qfA4LcrrzCc6bpHib_y9ZPLGla5OYdi1";
    const API_BASE = "https://sgp1.blynk.cloud/external/api/";
    let relayStates = new Array(8).fill(false);

    const bulbSVG = `<svg class="bulb-icon" viewBox="0 0 24 24"><path d="M12,2A7,7 0 0,0 5,9C5,11.39 6.19,13.5 8,14.74V17A1,1 0 0,0 9,18H15A1,1 0 0,0 16,17V14.74C17.81,13.5 19,11.39 19,9A7,7 0 0,0 12,2M9,21A1,1 0 0,0 10,22H14A1,1 0 0,0 15,21V20H9V21Z" /></svg>`;

    const grid = document.getElementById('main-grid');
    grid.innerHTML = relayStates.map((_, i) => `
        <div class="card" id="card-${i}" onclick="toggle(${i})">
            ${bulbSVG}
            <span>หลอดที่ ${i+1}</span>
            <div class="btn-toggle"></div>
        </div>
    `).join('');

    async function checkServer() {
        try {
            const res = await fetch(`${API_BASE}isHardwareConnected?token=${TOKEN}`);
            const isOnline = await res.json();
            document.getElementById('status-dot').className = isOnline ? "dot online" : "dot offline";
            document.getElementById('status-text').innerText = isOnline ? "BOARD ONLINE" : "BOARD OFFLINE";
        } catch (e) { }
    }

    async function syncStatus() {
        try {
            const promises = relayStates.map((_, i) => fetch(`${API_BASE}get?token=${TOKEN}&V${i}`).then(r => r.text()));
            const results = await Promise.all(promises);
            relayStates = results.map(val => val.trim() === "1");
            updateUI();
        } catch (err) { }
    }

    function toggle(id) {
        relayStates[id] = !relayStates[id];
        updateUI();
        fetch(`${API_BASE}update?token=${TOKEN}&V${id}=${relayStates[id] ? 1 : 0}`);
    }

    function masterAction(val) {
        relayStates.fill(val === 1);
        updateUI();
        const vPin = val === 1 ? 'V8' : 'V9';
        fetch(`${API_BASE}update?token=${TOKEN}&${vPin}=1`);
    }

    function updateUI() {
        relayStates.forEach((state, i) => {
            const card = document.getElementById(`card-${i}`);
            if (card) state ? card.classList.add('active') : card.classList.remove('active');
        });
    }

    window.onload = () => {
        syncStatus();
        checkServer();
        setInterval(() => { syncStatus(); checkServer(); }, 2000);
    };
</script>
</body>
</html>
