<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home_8ch - v2.3 (Visual Status)</title>
    <style>
        :root { --bright-green: #26ff00; --dark-bg: #0a0a0a; --card-bg: #1a1a1a; --offline-red: #ff3131; --bulb-off: #444; --bulb-on: #ffd700; }
        body { font-family: 'Inter', sans-serif; background: var(--dark-bg); color: #fff; padding: 20px; text-align: center; }
        
        .header-controls { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 30px; }
        .server-status { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 20px; background: #222; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .online { background: var(--bright-green); box-shadow: 0 0 10px var(--bright-green); }
        .offline { background: var(--offline-red); box-shadow: 0 0 10px var(--offline-red); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 800px; margin: auto; }
        .card { background: var(--card-bg); border-radius: 18px; padding: 20px; border: 1px solid #333; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .card.active { border-color: var(--bright-green); box-shadow: 0 0 15px rgba(38, 255, 0, 0.2); }
        
        /* สไตล์ของรูปหลอดไฟ */
        .bulb-icon { width: 40px; height: 40px; fill: var(--bulb-off); transition: 0.3s; filter: drop-shadow(0 0 2px rgba(0,0,0,0.5)); }
        .active .bulb-icon { fill: var(--bulb-on); filter: drop-shadow(0 0 8px var(--bulb-on)); }

        .btn-toggle { width: 50px; height: 25px; background: #333; border-radius: 20px; position: relative; pointer-events: none; }
        .btn-toggle::before { content: ''; position: absolute; width: 19px; height: 19px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
        .active .btn-toggle { background: var(--bright-green); }
        .active .btn-toggle::before { left: 28px; }

        .master-controls { display: flex; gap: 10px; max-width: 800px; margin: 30px auto; }
        .m-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-on { background: var(--bright-green); color: #000; }
        .btn-off { background: #444; color: #fff; }
        .version { font-size: 0.7rem; color: #444; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>HOME_8CH</h1>
    
    <div class="header-controls">
        <div class="server-status">
            <div id="status-dot" class="dot offline"></div>
            <span id="status-text" style="font-size: 0.8rem;">กำลังเริ่มระบบ...</span>
        </div>
    </div>

    <div class="grid" id="main-grid"></div>

    <div class="master-controls">
        <button class="m-btn btn-on" onclick="masterAction(1)">เปิดทั้งหมด</button>
        <button class="m-btn btn-off" onclick="masterAction(0)">ปิดทั้งหมด</button>
    </div>

    <div class="version">v2.3 | Visual Bulbs & 2s Silent Sync</div>

<script>
    const TOKEN = "qfA4LcrrzCc6bpHib_y9ZPLGla5OYdi1";
    const API_BASE = "https://sgp1.blynk.cloud/external/api/";

    let relayStates = new Array(8).fill(false);

    // ไอคอนหลอดไฟ SVG
    const bulbSVG = `
        <svg class="bulb-icon" viewBox="0 0 24 24">
            <path d="M12,2A7,7 0 0,0 5,9C5,11.39 6.19,13.5 8,14.74V17A1,1 0 0,0 9,18H15A1,1 0 0,0 16,17V14.74C17.81,13.5 19,11.39 19,9A7,7 0 0,0 12,2M9,21A1,1 0 0,0 10,22H14A1,1 0 0,0 15,21V20H9V21Z" />
        </svg>
    `;

    // 1. สร้าง Interface (เปลี่ยนเป็น "หลอดที่")
    const grid = document.getElementById('main-grid');
    grid.innerHTML = relayStates.map((_, i) => `
        <div class="card" id="card-${i}" onclick="toggle(${i})">
            ${bulbSVG}
            <span>หลอดที่ ${i+1}</span>
            <div class="btn-toggle"></div>
        </div>
    `).join('');

    async function checkServer() {
        try {
            const res = await fetch(`${API_BASE}isHardwareConnected?token=${TOKEN}`);
            const isOnline = await res.json();
            document.getElementById('status-dot').className = isOnline ? "dot online" : "dot offline";
            document.getElementById('status-text').innerText = isOnline ? "BOARD ONLINE" : "BOARD OFFLINE";
        } catch (e) { console.error("Connection Error"); }
    }

    async function syncStatus() {
        try {
            const promises = relayStates.map((_, i) => fetch(`${API_BASE}get?token=${TOKEN}&V${i}`).then(r => r.text()));
            const results = await Promise.all(promises);
            relayStates = results.map(val => val.trim() === "1");
            updateUI();
        } catch (err) { console.error("Sync Error"); }
    }

    function toggle(id) {
        relayStates[id] = !relayStates[id];
        updateUI();
        fetch(`${API_BASE}update?token=${TOKEN}&V${id}=${relayStates[id] ? 1 : 0}`);
    }

    function masterAction(val) {
        relayStates.fill(val === 1);
        updateUI();
        const vPin = val === 1 ? 'V8' : 'V9';
        fetch(`${API_BASE}update?token=${TOKEN}&${vPin}=1`);
    }

    function updateUI() {
        relayStates.forEach((state, i) => {
            const card = document.getElementById(`card-${i}`);
            if (card) state ? card.classList.add('active') : card.classList.remove('active');
        });
    }

    window.onload = () => {
        syncStatus();
        checkServer();
        setInterval(() => {
            syncStatus();
            checkServer();
        }, 2000); // ทำงานเบื้องหลังทุก 2 วินาที
    };
</script>
</body>
</html>
